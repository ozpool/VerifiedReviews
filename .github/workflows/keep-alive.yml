name: Keep API warm

# Render's free tier spins the API down after ~15 minutes of no traffic, and the
# next request pays a 30-60s cold start. This job pings the health check often
# enough that the service never sees that much idle time, so a visitor to the
# live product always gets a fast, fully-working response.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /ready
        run: curl --fail --silent --show-error https://verifiedreviews.onrender.com/ready
